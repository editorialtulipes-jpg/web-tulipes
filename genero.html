<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Revista — Editorial Tulipes">

  <meta property="og:image" content="https://www.tulipeseditorial.com/assets/images/og-default.jpg">
  <meta property="og:url" content="https://www.tulipeseditorial.com/revista">
  <meta property="og:locale" content="es_MX">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo-tulipes.svg">
</head>

<body>

<header>
  <h1><img src="assets/images/logo-tulipes.svg" alt="" class="marca-logo">Editorial Tulipes</h1>
  <div class="header-acciones">
  <nav>
   <a href="/">Inicio</a>
   <a href="Catalogo">Tienda</a>
   <a href="autores">Autores</a>
   <a href="sobre">Sobre nosotros</a>
   <a href="contacto">Contacto</a>
   <a href="revista" class="activa">Revista</a>
  </nav>
    <button class="carrito-toggle" aria-label="Ver carrito" data-carrito-toggle><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 8h12l-1 12H7L6 8Z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg><span class="carrito-contador" data-carrito-contador>0</span></button>
  <button class="menu-toggle" aria-label="Abrir menú" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</header>

<section class="revista">

  <h2 id="titulo-genero">Revista</h2>
  <a href="revista" class="back-link">← Ver toda la revista</a>

  <div class="revista-grid" id="contenedor-articulos" style="margin-top:2.5rem"></div>
</section>

<footer>
  <p>© 2026 Editorial Tulipes — Guadalajara, México</p>
  <div class="footer-redes">
    <a href="https://www.instagram.com/editorial_tulipes/" target="_blank" rel="noopener">Instagram</a>
    <a href="privacidad">Aviso de Privacidad</a>
  </div>
</footer>

<script src="js/menu.js"></script>
<script src="js/script.js"></script>
<script>
  const tipo = new URLSearchParams(window.location.search).get("tipo") || "";
  document.getElementById("titulo-genero").textContent = tipo ? tipo : "Revista";
  cargarArticulos("contenedor-articulos", { genero: tipo || undefined });
</script>


<div class="carrito-fondo" data-carrito-fondo></div>
<aside class="carrito-panel" data-carrito-panel>
  <div class="carrito-cabecera">
    <h3>Carrito</h3>
    <button class="carrito-cerrar" data-carrito-cerrar aria-label="Cerrar carrito">&times;</button>
  </div>
  <div class="carrito-lista" data-carrito-lista></div>
  <p class="carrito-vacio" data-carrito-vacio>Tu carrito está vacío.</p>
  <div class="carrito-envio" data-envio-seccion style="display:none">
    <label for="zona-envio">Zona de envío</label>
    <select id="zona-envio" data-zona-envio></select>
    <div class="carrito-envio-linea">
      <span>Envío</span>
      <span data-envio-monto>$0</span>
    </div>
  </div>
  <div class="carrito-resumen">
    <div class="carrito-total-linea">
      <span>Total</span>
      <span data-carrito-total>$0</span>
    </div>
    <button class="btn carrito-pagar" data-carrito-pagar disabled>Pagar</button>
  </div>
</aside>
<script src="js/carrito.js"></script>

</body>
</html>
